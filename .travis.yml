os: linux
dist: bionic
language: c

git:
  depth: 3


env:
  global:
   # The next declaration is the encrypted COVERITY_SCAN_TOKEN, created
   #   via the "travis encrypt" command using the project repo's public key
   - secure: ""


addons:
  apt:
    packages:
      - libpopt-dev
      - libselinux1-dev
      - libacl1-dev
      - automake
  coverity_scan:
    project:
      name: "cgzones/logrotate"
      description: "Build submitted via Travis CI"
    notification_email: cgzones@googlemail.com
    build_command_prepend: "./autogen.sh && ./configure --disable-silent-rules --with-selinux --with-acl --enable-werror && make clean"
    build_command: "make"
    branch_pattern: coverity_scan


script:
  - cat "${TRAVIS_BUILD_DIR}/cov-int/scm_log.txt"
